apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: apache-app

  template:
    metadata:
      labels:
        app: apache-app

    spec:
      containers:
      - name: apache
        image: valentinapaz/apache-ea2:latest

        ports:
        - containerPort: 80
